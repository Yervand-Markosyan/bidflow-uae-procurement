    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
    (function() {
      const BIDFLOW_API = "https://ais-dev-ntazh4dq53lpfbniqopixv-81264801679.europe-west3.run.app/api/track";
      const SESSION_START = Date.now();
      let videoStartTime = 0;
      let totalVideoTime = 0;

      function track(eventName, properties = {}) {
        const event = {
          event_name: eventName,
          timestamp: new Date().toISOString(),
          session_id: getSessionId(),
          properties: {
            ...properties,
            utm_source: getParam('utm_source') || getReferrerSource(),
            utm_campaign: getParam('utm_campaign'),
            utm_medium: getParam('utm_medium'),
            device: window.innerWidth < 768 ? 'Mobile' : 'Desktop',
            language: navigator.language.startsWith('ar') ? 'AR' : 'EN',
            session_duration: Math.floor((Date.now() - SESSION_START) / 1000),
            page_url: window.location.href
          }
        };
        try {
          fetch(BIDFLOW_API, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify(event), 
            keepalive: true 
          }).catch(() => {
            // Silently handle fetch errors to prevent console noise
          });
        } catch (e) {
          // Handle synchronous errors
        }
      }

      function getSessionId() {
        let sid = sessionStorage.getItem('bf_sid');
        if (!sid) { sid = 's_' + Math.random().toString(36).substr(2, 9); sessionStorage.setItem('bf_sid', sid); }
        return sid;
      }

      function getParam(name) { return new URLSearchParams(window.location.search).get(name); }

      function getReferrerSource() {
        const ref = document.referrer;
        if (!ref) return 'Direct';
        if (ref.includes('google.com')) return 'google';
        if (ref.includes('facebook.com')) return 'facebook';
        if (ref.includes('instagram.com')) return 'instagram';
        if (ref.includes('linkedin.com')) return 'linkedin';
        return 'Organic_Referral';
      }

      function initVideoTracking() {
        const video = document.querySelector('video');
        if (!video) return;
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting && !video.paused) { if (videoStartTime === 0) videoStartTime = Date.now(); }
            else { if (videoStartTime > 0) { totalVideoTime += (Date.now() - videoStartTime) / 1000; videoStartTime = 0; } }
          });
        }, { threshold: 0.5 });
        observer.observe(video);
        video.addEventListener('play', () => { if (videoStartTime === 0) videoStartTime = Date.now(); });
        video.addEventListener('pause', () => { if (videoStartTime > 0) { totalVideoTime += (Date.now() - videoStartTime) / 1000; videoStartTime = 0; } });
        window.addEventListener('beforeunload', () => {
          if (videoStartTime > 0) totalVideoTime += (Date.now() - videoStartTime) / 1000;
          if (totalVideoTime > 2) track('video_watch_time', { video_duration: Math.round(totalVideoTime), watched_real: true });
          const finalDuration = Math.floor((Date.now() - SESSION_START) / 1000);
          track('session_end', { duration: finalDuration, duration_segment: finalDuration > 9 ? '>9s' : '<9s' });
        });
      }

      track('page_view_landing');
      
      // Wait for DOM to be ready for video tracking
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initVideoTracking);
      } else {
        initVideoTracking();
      }

      window.bidflow = { 
        track,
        trackEarlyAccess: (email, role) => track('early_access_signup', { email, role }),
        trackSupplier: (step, data) => {
          const events = { 1: 'supplier_signup_started', 2: 'supplier_materials_selected', 3: 'supplier_pricing_entered', 4: 'supplier_company_info_entered', 5: 'supplier_signup_submitted' };
          track(events[step] || 'supplier_signup_step', data);
        },
        trackBuyer: (step, data) => {
          const events = { 1: 'material_request_started', 2: 'material_category_selected', 3: 'material_quantity_entered', 4: 'project_location_entered', 5: 'material_request_submitted' };
          track(events[step] || 'material_request_step', data);
        }
      };
    })();
    </script>
