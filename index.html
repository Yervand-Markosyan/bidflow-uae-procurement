    <!-- Bidflow Tracking Script -->
    <script>
    (function() {
      const BIDFLOW_API = "https://ais-pre-ntazh4dq53lpfbniqopixv-81264801679.europe-west3.run.app/api/track";
      const SESSION_START = Date.now();
      window.SESSION_START = SESSION_START;
      let videoStartTime = 0;
      let totalVideoTime = 0;
      let maxScroll = 0;
      window.maxScroll = maxScroll;
      let videoElement = null;
    
      function track(eventName, properties = {}) {
        const SESSION_DURATION = Math.floor((Date.now() - SESSION_START) / 1000);
        
        // Get current scroll depth
        const h = document.documentElement;
        const b = document.body;
        const st = 'scrollTop';
        const sh = 'scrollHeight';
        const currentScrollPercent = Math.round((h[st] || b[st]) / ((h[sh] || b[sh]) - h.clientHeight) * 100) || 0;
        if (currentScrollPercent > maxScroll) maxScroll = currentScrollPercent;
        
        // Calculate current video watch time (including currently playing)
        let liveVideoTime = totalVideoTime;
        if (videoStartTime > 0) {
          liveVideoTime += (Date.now() - videoStartTime) / 1000;
        }

        const event = {
          event_name: eventName,
          timestamp: new Date().toISOString(),
          session_id: getSessionId(),
          properties: {
            // 1. Mandatory base data
            email: properties.email || "",
            role: properties.role || "",
            timestamp: new Date().toISOString(),
            
            // 2. Traffic & UTM
            utm_source: getParam('utm_source') || getReferrerSource() || "",
            utm_campaign: getParam('utm_campaign') || "",
            utm_medium: getParam('utm_medium') || "",
            
            // 3. Engagement Metrics
            session_duration: SESSION_DURATION,
            // Send both variants for compatibility
            scroll: maxScroll || 0,
            scroll_depth: maxScroll || 0,
            video_duration: Math.round(liveVideoTime) || 0,
            video_watch_time: Math.round(liveVideoTime) || 0,
            
            // 4. Environment & Context
            device: window.innerWidth < 768 ? 'Mobile' : 'Desktop',
            language: navigator.language || "en",
            location: properties.location || properties.city || "",
            city: properties.city || properties.location || "",
            url: window.location.href,
            path: window.location.pathname,
            
            // Include any additional properties passed
            ...properties
          }
        };
        
        const payload = JSON.stringify(event);

        if (navigator.sendBeacon) {
          const blob = new Blob([payload], { type: 'application/json' });
          if (navigator.sendBeacon(BIDFLOW_API, blob)) return;
        }

        fetch(BIDFLOW_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: payload,
          keepalive: true,
          mode: 'cors',
          credentials: 'omit'
        }).catch(err => console.error('Bidflow tracking failed', err));
      }
    
      function getSessionId() {
        let sid = sessionStorage.getItem('bf_sid');
        if (!sid) {
          sid = 's_' + Math.random().toString(36).substr(2, 9);
          sessionStorage.setItem('bf_sid', sid);
        }
        return sid;
      }
    
      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }
    
      function getReferrerSource() {
        const ref = document.referrer;
        if (!ref) return 'Ուղիղ';
        if (ref.includes('google.com')) return 'google';
        if (ref.includes('facebook.com')) return 'facebook';
        if (ref.includes('instagram.com')) return 'instagram';
        if (ref.includes('linkedin.com')) return 'linkedin';
        return 'Organic_Referral';
      }
    
      // Video Tracking with IntersectionObserver to avoid autoplay false positives
      function initVideoTracking(retryCount = 0) {
        const video = document.querySelector('video');
        if (!video) {
          if (retryCount < 20) {
            setTimeout(() => initVideoTracking(retryCount + 1), 1000);
          }
          return;
        }
        
        if (videoElement === video) return; // Already tracking this element
        videoElement = video;
    
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting && !video.paused) {
              if (videoStartTime === 0) videoStartTime = Date.now();
            } else {
              if (videoStartTime > 0) {
                totalVideoTime += (Date.now() - videoStartTime) / 1000;
                videoStartTime = 0;
              }
            }
          });
        }, { threshold: 0.1 }); // More sensitive threshold
    
        observer.observe(video);
    
        video.addEventListener('play', () => {
          if (videoStartTime === 0) videoStartTime = Date.now();
        });
    
        video.addEventListener('pause', () => {
          if (videoStartTime > 0) {
            totalVideoTime += (Date.now() - videoStartTime) / 1000;
            videoStartTime = 0;
          }
        });

        video.addEventListener('ended', () => {
          if (videoStartTime > 0) {
            totalVideoTime += (Date.now() - videoStartTime) / 1000;
            videoStartTime = 0;
          }
        });
    
        // Final video stats on page leave
        window.addEventListener('beforeunload', () => {
          if (videoStartTime > 0) {
            totalVideoTime += (Date.now() - videoStartTime) / 1000;
          }
          if (totalVideoTime > 2) { // Only track if watched more than 2 seconds
            track('video_watch_time', { 
              video_duration: Math.round(totalVideoTime),
              watched_real: true 
            });
          }
          
          // Final session duration
          const finalDuration = Math.floor((Date.now() - SESSION_START) / 1000);
          track('session_end', { 
            duration: finalDuration,
            duration_segment: finalDuration > 9 ? '>9s' : '<9s'
          });
        });
      }
    
      // Scroll Tracking
      function initScrollTracking() {
        window.addEventListener('scroll', () => {
          const h = document.documentElement;
          const b = document.body;
          const st = 'scrollTop';
          const sh = 'scrollHeight';
          const scrollPercent = Math.round((h[st] || b[st]) / ((h[sh] || b[sh]) - h.clientHeight) * 100);
          if (scrollPercent > maxScroll) {
            maxScroll = scrollPercent;
            window.maxScroll = maxScroll;
          }
        });
    
        window.addEventListener('beforeunload', () => {
          if (maxScroll > 5) { // Only track if meaningful scroll happened
            track('scroll_depth', { scroll_depth: maxScroll, scroll: maxScroll });
          }
        });
      }
    
      // Auto-track page view
      track('script_initialized', { version: '1.3' });
      track('page_view_landing');
      
      // Support periodic checks for the video element
      initVideoTracking();
      setInterval(initVideoTracking, 5000);
      
      initScrollTracking();
    
      // Global access for custom events
      window.bidflow = { 
        track,
        getVideoWatchTime: () => {
          let liveVideoTime = totalVideoTime;
          if (videoStartTime > 0) {
            liveVideoTime += (Date.now() - videoStartTime) / 1000;
          }
          return Math.round(liveVideoTime);
        },
        // Helper for early access
        trackEarlyAccess: (email, role) => {
          track('early_access_signup', { email, role });
        },
        // Helper for supplier signup
        trackSupplier: (step, data) => {
          const events = {
            1: 'supplier_signup_started',
            2: 'supplier_materials_selected',
            3: 'supplier_pricing_entered',
            4: 'supplier_company_info_entered',
            5: 'supplier_signup_submitted'
          };
          track(events[step] || 'supplier_signup_step', data);
        },
        // Helper for buyer request
        trackBuyer: (step, data) => {
          const events = {
            1: 'material_request_started',
            2: 'material_category_selected',
            3: 'material_quantity_entered',
            4: 'project_location_entered',
            5: 'material_request_submitted'
          };
          track(events[step] || 'material_request_step', data);
        }
      };
    })();
    </script>
