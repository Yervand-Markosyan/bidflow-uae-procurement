    <!-- Bidflow Tracking Script -->
    <script>
    (function() {
      const BIDFLOW_API = "https://ais-pre-ntazh4dq53lpfbniqopixv-81264801679.europe-west3.run.app/api/track";
      const SESSION_START = Date.now();
      window.SESSION_START = SESSION_START;
      
      // Global metrics object for all tracking services to share
      window.bidflow_metrics = {
        videoStartTime: 0,
        totalVideoTime: 0,
        maxScroll: 0,
        videoElement: null
      };
    
      function track(eventName, properties = {}) {
        const SESSION_DURATION = Math.floor((Date.now() - SESSION_START) / 1000);
        
        // Update maxScroll one last time before calculating properties
        const h = document.documentElement;
        const b = document.body;
        const st = 'scrollTop';
        const sh = 'scrollHeight';
        const currentScrollPercent = Math.round((h[st] || b[st]) / ((h[sh] || b[sh]) - h.clientHeight) * 100) || 0;
        if (currentScrollPercent > window.bidflow_metrics.maxScroll) {
          window.bidflow_metrics.maxScroll = currentScrollPercent;
        }
        
        // Calculate live video watch time
        let liveVideoTime = window.bidflow_metrics.totalVideoTime;
        if (window.bidflow_metrics.videoStartTime > 0) {
          liveVideoTime += (Date.now() - window.bidflow_metrics.videoStartTime) / 1000;
        }

        const calculatedProperties = {
          // 1. Mandatory base data
          email: properties.email || "",
          role: properties.role || "",
          timestamp: new Date().toISOString(),
          
          // 2. Traffic & UTM
          utm_source: getParam('utm_source') || getReferrerSource() || "",
          utm_campaign: getParam('utm_campaign') || "",
          utm_medium: getParam('utm_medium') || "",
          
          // 3. Engagement Metrics
          session_duration: SESSION_DURATION,
          scroll: Math.max(window.bidflow_metrics.maxScroll, properties.scroll || 0),
          scroll_depth: Math.max(window.bidflow_metrics.maxScroll, properties.scroll_depth || 0),
          video_duration: Math.max(Math.round(liveVideoTime), properties.video_duration || 0),
          video_watch_time: Math.max(Math.round(liveVideoTime), properties.video_watch_time || 0),
          
          // 4. Environment & Context
          device: window.innerWidth < 768 ? 'Mobile' : 'Desktop',
          language: navigator.language || "en",
          location: properties.location || properties.city || "",
          city: properties.city || properties.location || "",
          url: window.location.href,
          path: window.location.pathname
        };

        const event = {
          event_name: eventName,
          timestamp: new Date().toISOString(),
          session_id: getSessionId(),
          properties: {
            ...calculatedProperties,
            ...properties // Explicit properties still take precedence if provided manually
          }
        };
        
        const payload = JSON.stringify(event);

        if (navigator.sendBeacon) {
          try {
            const blob = new Blob([payload], { type: 'application/json' });
            if (navigator.sendBeacon(BIDFLOW_API, blob)) return;
          } catch (e) {
            console.warn('sendBeacon failed, falling back to fetch');
          }
        }

        fetch(BIDFLOW_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: payload,
          keepalive: true,
          mode: 'cors',
          credentials: 'omit'
        }).catch(err => console.error('Bidflow tracking failed', err));
      }
    
      function getSessionId() {
        let sid = sessionStorage.getItem('bf_sid');
        if (!sid) {
          sid = 's_' + Math.random().toString(36).substr(2, 9);
          sessionStorage.setItem('bf_sid', sid);
        }
        return sid;
      }
    
      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }
    
      function getReferrerSource() {
        const ref = document.referrer;
        if (!ref) return 'Ուղիղ';
        if (ref.includes('google.com')) return 'google';
        if (ref.includes('facebook.com')) return 'facebook';
        if (ref.includes('instagram.com')) return 'instagram';
        if (ref.includes('linkedin.com')) return 'linkedin';
        return 'Organic_Referral';
      }
    
      // Video Tracking with IntersectionObserver to avoid autoplay false positives
      function initVideoTracking(retryCount = 0) {
        const video = document.querySelector('video');
        if (!video) {
          if (retryCount < 20) {
            setTimeout(() => initVideoTracking(retryCount + 1), 1000);
          }
          return;
        }
        
        if (window.bidflow_metrics.videoElement === video) return; // Already tracking this element
        window.bidflow_metrics.videoElement = video;
        
        console.log('Bidflow: Video element found, starting heartbeat tracking');
    
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (!entry.isIntersecting && window.bidflow_metrics.videoStartTime > 0) {
              window.bidflow_metrics.totalVideoTime += (Date.now() - window.bidflow_metrics.videoStartTime) / 1000;
              window.bidflow_metrics.videoStartTime = 0;
            }
          });
        }, { threshold: 0.1 });
    
        observer.observe(video);
    
        // Robust heartbeat: check every second if video is playing
        setInterval(() => {
          if (video && !video.paused && !video.seeking && video.readyState >= 2) {
            // If it's the first heart beat since we started playing
            if (window.bidflow_metrics.videoStartTime === 0) {
              window.bidflow_metrics.videoStartTime = Date.now();
            } else {
              // Add the last second to total, and reset start time to now to keep it fresh
              const now = Date.now();
              window.bidflow_metrics.totalVideoTime += (now - window.bidflow_metrics.videoStartTime) / 1000;
              window.bidflow_metrics.videoStartTime = now;
            }
          } else {
            // If not playing, ensure we've flushed any pending time
            if (window.bidflow_metrics.videoStartTime > 0) {
              window.bidflow_metrics.totalVideoTime += (Date.now() - window.bidflow_metrics.videoStartTime) / 1000;
              window.bidflow_metrics.videoStartTime = 0;
            }
          }
        }, 1000);

        video.addEventListener('play', () => {
          if (window.bidflow_metrics.videoStartTime === 0) window.bidflow_metrics.videoStartTime = Date.now();
        });
    
        video.addEventListener('pause', () => {
          if (window.bidflow_metrics.videoStartTime > 0) {
            window.bidflow_metrics.totalVideoTime += (Date.now() - window.bidflow_metrics.videoStartTime) / 1000;
            window.bidflow_metrics.videoStartTime = 0;
          }
        });
      }
    
      // Scroll Tracking
      function initScrollTracking() {
        window.addEventListener('scroll', () => {
          const h = document.documentElement;
          const b = document.body;
          const st = 'scrollTop';
          const sh = 'scrollHeight';
          const scrollPercent = Math.round((h[st] || b[st]) / ((h[sh] || b[sh]) - h.clientHeight) * 100);
          if (scrollPercent > window.bidflow_metrics.maxScroll) {
            window.bidflow_metrics.maxScroll = scrollPercent;
          }
        });
      }
    
      // Auto-track page view
      track('script_initialized', { version: '1.5' });
      track('page_view_landing');
      
      // Periodic check for video and scroll init
      initVideoTracking();
      initScrollTracking();
      setInterval(initVideoTracking, 5000);

      // Final stats on page leave - Consolidated
      window.addEventListener('beforeunload', () => {
        // Final video time update
        if (window.bidflow_metrics.videoStartTime > 0) {
          window.bidflow_metrics.totalVideoTime += (Date.now() - window.bidflow_metrics.videoStartTime) / 1000;
          window.bidflow_metrics.videoStartTime = 0;
        }

        const totalVideo = Math.round(window.bidflow_metrics.totalVideoTime);
        if (totalVideo > 2) {
          track('video_watch_time', { 
            video_duration: totalVideo,
            watched_real: true 
          });
        }
        
        if (window.bidflow_metrics.maxScroll > 5) {
          track('scroll_depth', { 
            scroll_depth: window.bidflow_metrics.maxScroll, 
            scroll: window.bidflow_metrics.maxScroll 
          });
        }

        const finalDuration = Math.floor((Date.now() - SESSION_START) / 1000);
        track('session_end', { 
          duration: finalDuration,
          duration_segment: finalDuration > 9 ? '>9s' : '<9s',
          final_scroll: window.bidflow_metrics.maxScroll,
          final_video: totalVideo
        });
      });
    
      // Global access for custom events
      window.bidflow = { 
        track,
        getVideoWatchTime: () => {
          let liveVideoTime = window.bidflow_metrics.totalVideoTime;
          if (window.bidflow_metrics.videoStartTime > 0) {
            liveVideoTime += (Date.now() - window.bidflow_metrics.videoStartTime) / 1000;
          }
          return Math.round(liveVideoTime);
        },
        // Helper for early access
        trackEarlyAccess: (email, role) => {
          track('early_access_signup', { email, role });
        },
        // Helper for supplier signup
        trackSupplier: (step, data) => {
          const events = {
            1: 'supplier_signup_started',
            2: 'supplier_materials_selected',
            3: 'supplier_pricing_entered',
            4: 'supplier_company_info_entered',
            5: 'supplier_signup_submitted'
          };
          track(events[step] || 'supplier_signup_step', data);
        },
        // Helper for buyer request
        trackBuyer: (step, data) => {
          const events = {
            1: 'material_request_started',
            2: 'material_category_selected',
            3: 'material_quantity_entered',
            4: 'project_location_entered',
            5: 'material_request_submitted'
          };
          track(events[step] || 'material_request_step', data);
        }
      };
    })();
    </script>
